server:
  port: 6664

spring:
  application:
    name: carrentals-service

  datasource:
    url: jdbc:mysql://localhost:3306/rentaldb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:6661/eureka